<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floppy Duck</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #66c0f2;
            --sky-bottom: #a0d995;
            --gold: #f5d600;
            --green: #3a5a18;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 480px;
            background: #fffbe6;
            border-radius: 16px;
            border: 3px solid var(--green);
            padding: 40px 32px;
            box-shadow: 0 6px 0 var(--green);
            text-align: center;
        }
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: var(--gold);
            text-shadow: 3px 3px 0 var(--green);
            margin-bottom: 12px;
        }
        .tagline {
            font-size: 15px;
            color: #666;
            margin-bottom: 32px;
        }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a {
            display: block;
            background: var(--green);
            color: #fffbe6;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            transition: transform 0.1s;
        }
        .links a:hover { transform: scale(1.03); }
        .footer { font-size: 12px; color: #888; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🦆 FLOPPY DUCK</h1>
        <p class="tagline">Flap. Score. Quack. Repeat.</p>
        <div class="links">
            <a href="privacy.html">PRIVACY POLICY</a>
            <a href="support.html">SUPPORT</a>
        </div>
        <p class="footer">© 2026 Floppy Duck</p>
    </div>
</body>
</html>
