name: CI Build & Screenshots

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Unit Tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          # Use latest Xcode 16.x available on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

          # Find the latest iOS simulator runtime
          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

          # Verify the simulator exists
          xcrun simctl list devices "iPhone 16 Pro" available

      - name: Build (Debug, iphonesimulator)
        run: |
          xcodebuild build \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit

  screenshots:
    name: Screenshot Tests
    runs-on: macos-15
    timeout-minutes: 25
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" 2>/dev/null || true
          sleep 5
          xcrun simctl status_bar "iPhone 16 Pro" override \
            --time "9:41" --batteryState charged --batteryLevel 100 \
            --cellularBars 4 --wifiBars 3 2>/dev/null || true

      - name: Run Screenshot Tests
        id: run_tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckUITests/ScreenshotTests \
            -skip-testing:FloppyDuckTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty
        continue-on-error: true

      - name: Extract Screenshots
        if: always()
        timeout-minutes: 5
        run: |
          set +e
          mkdir -p screenshots

          if [ ! -d "TestResults.xcresult" ]; then
            echo "⚠️ No TestResults.xcresult found"
            tail -50 build.log 2>/dev/null || true
            exit 0
          fi

          echo "xcresult bundle found ($(du -sh TestResults.xcresult | cut -f1))"

          # Single Python script that tries every extraction strategy with
          # per-step timeouts, graceful fallbacks, and clear logging.
          python3 << 'PYEOF'
          import json, subprocess, os, re, sys, time

          RESULT_PATH = "TestResults.xcresult"
          OUT_DIR      = "screenshots"
          CMD_TIMEOUT  = 30       # seconds per shell command
          EXPORT_TIMEOUT = 15     # seconds per single file export

          # ── helpers ────────────────────────────────────────────────

          def run(cmd, timeout=CMD_TIMEOUT):
              """Run a command with a timeout; return (stdout, ok)."""
              try:
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=timeout)
                  return r.stdout, r.returncode == 0
              except subprocess.TimeoutExpired:
                  print(f"  ⏱️  Timed out after {timeout}s: {' '.join(cmd[:4])}...")
                  return "", False
              except Exception as e:
                  print(f"  💥 {e}")
                  return "", False

          def export_attachment(ref_id, out_path):
              """Try exporting a single attachment with two strategies."""
              for cmd in [
                  ["xcrun", "xcresulttool", "export", "--type", "file",
                   "--path", RESULT_PATH, "--id", ref_id,
                   "--output-path", out_path],
                  ["xcrun", "xcresulttool", "export", "object", "--legacy",
                   "--path", RESULT_PATH, "--id", ref_id,
                   "--type", "file", "--output-path", out_path],
              ]:
                  _, ok = run(cmd, timeout=EXPORT_TIMEOUT)
                  if ok and os.path.exists(out_path) and os.path.getsize(out_path) > 0:
                      return True
              return False

          def safe_filename(name, index):
              if name:
                  return re.sub(r'[^a-zA-Z0-9_\-]', '_', name)
              return f"attachment_{index}"

          def walk_json(obj, attachments):
              """Recursively find attachments in any xcresult JSON format."""
              if isinstance(obj, dict):
                  name = obj.get("name", "")
                  if isinstance(name, dict):
                      name = name.get("_value", name.get("value", ""))

                  # Check multiple possible ref keys
                  for ref_key in ("payloadRef", "payload"):
                      ref_obj = obj.get(ref_key)
                      if isinstance(ref_obj, dict):
                          ref_id = ref_obj.get("id", "")
                          if isinstance(ref_id, dict):
                              ref_id = ref_id.get("_value", ref_id.get("value", ""))
                          if ref_id:
                              attachments.append({"name": name, "ref": ref_id})
                              return  # don't recurse into this node further

                  for v in obj.values():
                      walk_json(v, attachments)

              elif isinstance(obj, list):
                  for item in obj:
                      walk_json(item, attachments)

          def export_all(attachments):
              exported = 0
              for i, att in enumerate(attachments):
                  fname = safe_filename(att["name"], i)
                  out = os.path.join(OUT_DIR, f"{fname}.png")
                  if export_attachment(att["ref"], out):
                      exported += 1
                      sz = os.path.getsize(out)
                      print(f"  ✅ {fname}.png ({sz:,} bytes)")
                  else:
                      print(f"  ❌ {fname}: export failed — skipping")
              return exported

          # ── Strategy 1: Xcode 16+ test-results attachments API ────

          print("━━━ Strategy 1: xcresulttool get test-results attachments ━━━")
          stdout, ok = run(["xcrun", "xcresulttool", "get", "test-results",
                            "attachments", "--path", RESULT_PATH])

          attachments = []
          if ok and stdout.strip():
              try:
                  data = json.loads(stdout)
                  walk_json(data, attachments)
                  print(f"  Found {len(attachments)} attachments")
              except json.JSONDecodeError as e:
                  print(f"  JSON parse failed: {e}")

          if attachments:
              exported = export_all(attachments)
              print(f"\n📸 Strategy 1 result: {exported}/{len(attachments)} exported")
              if exported > 0:
                  sys.exit(0)
              print("  Export succeeded 0 — falling through\n")

          # ── Strategy 2: xcresulttool get (new format) ─────────────

          print("━━━ Strategy 2: xcresulttool get (Xcode 16 JSON) ━━━")
          stdout, ok = run(["xcrun", "xcresulttool", "get",
                            "--path", RESULT_PATH])

          attachments = []
          if ok and stdout.strip():
              try:
                  data = json.loads(stdout)
                  walk_json(data, attachments)
                  print(f"  Found {len(attachments)} attachments")
              except json.JSONDecodeError as e:
                  print(f"  JSON parse failed: {e}")

          if attachments:
              exported = export_all(attachments)
              print(f"\n📸 Strategy 2 result: {exported}/{len(attachments)} exported")
              if exported > 0:
                  sys.exit(0)
              print("  Export succeeded 0 — falling through\n")

          # ── Strategy 3: legacy format ─────────────────────────────

          print("━━━ Strategy 3: xcresulttool get --format json --legacy ━━━")
          stdout, ok = run(["xcrun", "xcresulttool", "get",
                            "--path", RESULT_PATH,
                            "--format", "json", "--legacy"])

          attachments = []
          if ok and stdout.strip():
              try:
                  data = json.loads(stdout)
                  walk_json(data, attachments)
                  print(f"  Found {len(attachments)} attachments")
              except json.JSONDecodeError as e:
                  print(f"  JSON parse failed: {e}")

          if attachments:
              exported = export_all(attachments)
              print(f"\n📸 Strategy 3 result: {exported}/{len(attachments)} exported")
              if exported > 0:
                  sys.exit(0)

          # ── All strategies exhausted ──────────────────────────────

          print("\n⚠️  All extraction strategies found 0 exportable screenshots.")
          print("    This usually means the UI test didn't capture any.")
          print("    Check the build.log and test-results artifact for details.")
          PYEOF

          echo ""
          echo "📸 Final screenshot count:"
          ls -la screenshots/ 2>/dev/null || echo "  (empty)"
          TOTAL=$(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l | tr -d ' ')
          echo "  Total image files: $TOTAL"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Full Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Post Screenshots to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL secret not set — skipping Slack notification"
            exit 0
          fi

          SCREENSHOT_COUNT=$(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l | tr -d ' ')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 80)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$SCREENSHOT_COUNT" -gt "0" ]; then
            STATUS="✅ $SCREENSHOT_COUNT screenshots captured"
          else
            STATUS="⚠️ No screenshots captured — check CI logs"
          fi

          # Post summary to Slack
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"📸 *Screenshot CI* — \`${COMMIT_SHA}\` ${COMMIT_MSG}\n${STATUS}\n<${RUN_URL}|View Run> · <${RUN_URL}#artifacts|Download Screenshots>\"
            }" || echo "Slack notification failed"

      - name: Post Screenshot Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const screenshotDir = 'screenshots';

            let body = '## 📸 Screenshot Test Results\n\n';

            try {
              const files = fs.readdirSync(screenshotDir)
                .filter(f => f.endsWith('.png') || f.endsWith('.jpg'))
                .sort();

              if (files.length > 0) {
                body += `✅ **${files.length} screenshots captured** — download the \`app-screenshots\` artifact to review.\n\n`;
                body += '| Screenshot | File |\n|---|---|\n';
                files.forEach(f => {
                  const name = f.replace(/\.(png|jpg)$/, '').replace(/_/g, ' ');
                  body += `| ${name} | \`${f}\` |\n`;
                });
              } else {
                body += '⚠️ No screenshots were captured. Check the test logs and `test-results` artifact.\n';
              }
            } catch (e) {
              body += '⚠️ Could not read screenshots directory.\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
