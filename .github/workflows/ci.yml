name: CI Build & Screenshots

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Unit Tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          # Use latest Xcode 16.x available on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

          # Find the latest iOS simulator runtime
          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

          # Verify the simulator exists
          xcrun simctl list devices "iPhone 16 Pro" available

      - name: Build (Debug, iphonesimulator)
        run: |
          xcodebuild build \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit

  screenshots:
    name: Screenshot Tests
    runs-on: macos-15
    timeout-minutes: 25
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" 2>/dev/null || true
          sleep 5
          xcrun simctl status_bar "iPhone 16 Pro" override \
            --time "9:41" --batteryState charged --batteryLevel 100 \
            --cellularBars 4 --wifiBars 3 2>/dev/null || true

      - name: Run Screenshot Tests
        id: run_tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckUITests/ScreenshotTests \
            -skip-testing:FloppyDuckTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty
        continue-on-error: true

      - name: Extract Screenshots
        if: always()
        timeout-minutes: 5
        run: |
          set +e
          mkdir -p screenshots

          if [ ! -d "TestResults.xcresult" ]; then
            echo "⚠️ No TestResults.xcresult found"
            tail -50 build.log 2>/dev/null || true
            exit 0
          fi

          echo "xcresult bundle found ($(du -sh TestResults.xcresult | cut -f1))"

          # Extraction script — Xcode 16+ format 3.53 (zstd-compressed xcresult).
          python3 << 'PYEOF'
          import json, subprocess, os, re, sys, shutil

          RESULT = "TestResults.xcresult"
          OUT    = "screenshots"
          T      = 30   # command timeout

          def run(cmd, timeout=T):
              try:
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=timeout)
                  if r.returncode != 0 and r.stderr.strip():
                      print(f"  stderr: {r.stderr.strip()[:200]}")
                  return r.stdout, r.returncode
              except subprocess.TimeoutExpired:
                  print(f"  ⏱️  timeout: {' '.join(cmd[:5])}")
                  return "", -1
              except Exception as e:
                  print(f"  💥 {e}")
                  return "", -1

          def fname(name, i):
              return re.sub(r'[^a-zA-Z0-9_\-]', '_', name) if name else f"att_{i}"

          out, _ = run(["xcrun", "xcresulttool", "version"])
          print(f"xcresulttool: {out.strip()}")

          exported = 0

          # ── Strategy 1: legacy 2-step drill-down ───────────────────
          # Top-level JSON → find testsRef → fetch test details → attachments
          print("\n━━━ Strategy 1: legacy 2-step (top → testsRef → attachments) ━━━")
          out, rc = run(["xcrun", "xcresulttool", "get", "--path", RESULT,
                         "--format", "json", "--legacy"])
          if rc == 0 and out.strip():
              try:
                  top = json.loads(out)
                  # Drill: actions[*].actionResult.testsRef.id._value
                  actions = top.get("actions", {}).get("_values", [])
                  print(f"  Found {len(actions)} action(s)")
                  for ai, action in enumerate(actions):
                      tests_ref = (action.get("actionResult", {})
                                         .get("testsRef", {})
                                         .get("id", {})
                                         .get("_value", ""))
                      if not tests_ref:
                          print(f"  Action {ai}: no testsRef")
                          continue
                      print(f"  Action {ai}: testsRef={tests_ref[:20]}...")

                      # Fetch the tests detail object
                      detail_out, drc = run(["xcrun", "xcresulttool", "get",
                                             "--path", RESULT, "--id", tests_ref,
                                             "--format", "json", "--legacy"])
                      if drc != 0 or not detail_out.strip():
                          print(f"  Could not fetch testsRef detail")
                          continue

                      detail = json.loads(detail_out)

                      # Debug: show structure of test detail
                      def show_structure(obj, prefix="", depth=0):
                          if depth > 3:
                              return
                          if isinstance(obj, dict):
                              for k in list(obj.keys())[:8]:
                                  v = obj[k]
                                  if isinstance(v, dict):
                                      print(f"  {prefix}{k}: dict({list(v.keys())[:5]})")
                                      show_structure(v, prefix + "  ", depth+1)
                                  elif isinstance(v, list):
                                      print(f"  {prefix}{k}: list[{len(v)}]")
                                      if v:
                                          show_structure(v[0], prefix + "  ", depth+1)
                                  else:
                                      sv = str(v)[:50]
                                      print(f"  {prefix}{k}: {sv}")
                      show_structure(detail)

                      # Collect ALL ref-like IDs (summaryRef, payloadRef, etc.)
                      all_refs = []
                      summary_refs = []
                      def walk(obj, depth=0):
                          if depth > 50:
                              return
                          if isinstance(obj, dict):
                              nm = obj.get("name", {})
                              nm = nm.get("_value", "") if isinstance(nm, dict) else str(nm)
                              # Check for payloadRef
                              pr = obj.get("payloadRef", {})
                              if isinstance(pr, dict):
                                  rid = pr.get("id", {})
                                  rid = rid.get("_value", "") if isinstance(rid, dict) else str(rid)
                                  if rid:
                                      all_refs.append((nm, rid))
                              # Check for summaryRef (needs another fetch)
                              sr = obj.get("summaryRef", {})
                              if isinstance(sr, dict):
                                  rid = sr.get("id", {})
                                  rid = rid.get("_value", "") if isinstance(rid, dict) else str(rid)
                                  if rid:
                                      summary_refs.append((nm, rid))
                              for v in obj.values():
                                  walk(v, depth+1)
                          elif isinstance(obj, list):
                              for item in obj:
                                  walk(item, depth+1)
                      walk(detail)
                      print(f"  Found {len(all_refs)} payloadRef(s), {len(summary_refs)} summaryRef(s)")

                      # Drill into summaryRefs to find attachments
                      for sname, srid in summary_refs:
                          print(f"  Fetching summaryRef: {sname} ({srid[:20]}...)")
                          sum_out, src = run(["xcrun", "xcresulttool", "get",
                                              "--path", RESULT, "--id", srid,
                                              "--format", "json", "--legacy"])
                          if src != 0 or not sum_out.strip():
                              continue
                          try:
                              sum_data = json.loads(sum_out)
                              walk(sum_data)
                          except Exception:
                              pass
                      if summary_refs:
                          print(f"  After summaryRef drill: {len(all_refs)} total payloadRef(s)")
                      refs = all_refs

                      for i, (name, rid) in enumerate(refs):
                          fn = fname(name, i)
                          dest = os.path.join(OUT, f"{fn}.png")
                          _, erc = run(["xcrun", "xcresulttool", "export",
                                        "--path", RESULT, "--id", rid,
                                        "--output-path", dest, "--type", "file"],
                                       timeout=15)
                          if erc == 0 and os.path.exists(dest) and os.path.getsize(dest) > 0:
                              exported += 1
                              print(f"  ✅ {fn}.png ({os.path.getsize(dest):,}b)")
                          else:
                              print(f"  ❌ {fn} (ref {rid[:16]})")
              except (json.JSONDecodeError, Exception) as e:
                  print(f"  Error: {e}")

          if exported > 0:
              print(f"\n📸 Strategy 1: {exported} screenshots exported")
              sys.exit(0)

          # ── Strategy 2: Xcode 16+ test-results attachments ─────────
          print("\n━━━ Strategy 2: test-results attachments ━━━")
          out, rc = run(["xcrun", "xcresulttool", "get", "test-results",
                         "attachments", "--path", RESULT])
          if rc == 0 and out.strip():
              try:
                  data = json.loads(out)
                  print(f"  JSON type: {type(data).__name__}, keys: {list(data.keys())[:5] if isinstance(data, dict) else 'N/A'}")
                  # Walk for any id/ref/path references
                  refs = []
                  def walk2(obj):
                      if isinstance(obj, dict):
                          nm = obj.get("name", obj.get("filename", ""))
                          for k in ("payloadRef", "payload", "id", "path"):
                              v = obj.get(k)
                              if isinstance(v, dict) and "id" in v:
                                  refs.append((str(nm), v["id"]))
                              elif isinstance(v, str) and len(v) > 10:
                                  refs.append((str(nm), v))
                          for v in obj.values():
                              walk2(v)
                      elif isinstance(obj, list):
                          for item in obj:
                              walk2(item)
                  walk2(data)
                  print(f"  Found {len(refs)} refs")
              except Exception as e:
                  print(f"  Error: {e}")
          else:
              print(f"  rc={rc}, output={'empty' if not out.strip() else f'{len(out)} chars'}")

          # ── Strategy 3: zstd decompress + PNG search ───────────────
          print("\n━━━ Strategy 3: zstd decompress + PNG search ━━━")
          try:
              import zstandard
              HAS_ZSTD = True
          except ImportError:
              # Try to install
              subprocess.run([sys.executable, "-m", "pip", "install", "zstandard", "-q"],
                           capture_output=True)
              try:
                  import zstandard
                  HAS_ZSTD = True
              except ImportError:
                  HAS_ZSTD = False

          if HAS_ZSTD:
              dctx = zstandard.ZstdDecompressor()
              found = 0
              for root, dirs, files in os.walk(RESULT):
                  for f in files:
                      fp = os.path.join(root, f)
                      try:
                          with open(fp, "rb") as fh:
                              magic = fh.read(4)
                          if magic != b'\x28\xb5\x2f\xfd':
                              continue
                          with open(fp, "rb") as fh:
                              raw = dctx.decompress(fh.read(), max_output_size=50*1024*1024)
                          if raw[:4] == b'\x89PNG' or raw[:3] == b'\xff\xd8\xff':
                              dest = os.path.join(OUT, f"zstd_{found:02d}.png")
                              with open(dest, "wb") as out_f:
                                  out_f.write(raw)
                              exported += 1
                              found += 1
                              print(f"  ✅ zstd_{found-1:02d}.png ({len(raw):,}b)")
                      except Exception:
                          pass
              print(f"  Found {found} images in zstd-compressed files")
          else:
              print("  zstandard not available — skipping")

          if exported == 0:
              print("\n⚠️  All strategies found 0 screenshots.")
          else:
              print(f"\n📸 Total: {exported} screenshots exported")
          PYEOF

          echo ""
          echo "📸 Final screenshot count:"
          ls -la screenshots/ 2>/dev/null || echo "  (empty)"
          TOTAL=$(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l | tr -d ' ')
          echo "  Total image files: $TOTAL"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Full Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Post Screenshots to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL secret not set — skipping Slack notification"
            exit 0
          fi

          SCREENSHOT_COUNT=$(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l | tr -d ' ')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 80)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$SCREENSHOT_COUNT" -gt "0" ]; then
            STATUS="✅ $SCREENSHOT_COUNT screenshots captured"
          else
            STATUS="⚠️ No screenshots captured — check CI logs"
          fi

          # Post summary to Slack
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"📸 *Screenshot CI* — \`${COMMIT_SHA}\` ${COMMIT_MSG}\n${STATUS}\n<${RUN_URL}|View Run> · <${RUN_URL}#artifacts|Download Screenshots>\"
            }" || echo "Slack notification failed"

      - name: Post Screenshot Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const screenshotDir = 'screenshots';

            let body = '## 📸 Screenshot Test Results\n\n';

            try {
              const files = fs.readdirSync(screenshotDir)
                .filter(f => f.endsWith('.png') || f.endsWith('.jpg'))
                .sort();

              if (files.length > 0) {
                body += `✅ **${files.length} screenshots captured** — download the \`app-screenshots\` artifact to review.\n\n`;
                body += '| Screenshot | File |\n|---|---|\n';
                files.forEach(f => {
                  const name = f.replace(/\.(png|jpg)$/, '').replace(/_/g, ' ');
                  body += `| ${name} | \`${f}\` |\n`;
                });
              } else {
                body += '⚠️ No screenshots were captured. Check the test logs and `test-results` artifact.\n';
              }
            } catch (e) {
              body += '⚠️ Could not read screenshots directory.\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
