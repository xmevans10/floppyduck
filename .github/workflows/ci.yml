name: CI Build & Screenshots

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Unit Tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          # Use latest Xcode 16.x available on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

          # Find the latest iOS simulator runtime
          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

          # Verify the simulator exists
          xcrun simctl list devices "iPhone 16 Pro" available

      - name: Build (Debug, iphonesimulator)
        run: |
          xcodebuild build \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit

  screenshots:
    name: Screenshot Tests
    runs-on: macos-15
    timeout-minutes: 25
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" 2>/dev/null || true
          sleep 5
          xcrun simctl status_bar "iPhone 16 Pro" override \
            --time "9:41" --batteryState charged --batteryLevel 100 \
            --cellularBars 4 --wifiBars 3 2>/dev/null || true

      - name: Run Screenshot Tests
        id: run_tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckUITests/ScreenshotTests \
            -skip-testing:FloppyDuckTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty
        continue-on-error: true

      - name: Extract Screenshots
        if: always()
        run: |
          set +e  # Don't fail on individual command errors
          mkdir -p screenshots

          echo "=== Checking TestResults.xcresult ==="
          if [ ! -d "TestResults.xcresult" ]; then
            echo "⚠️ No TestResults.xcresult found"
            echo "=== Build log tail ==="
            tail -50 build.log 2>/dev/null || true
            exit 0
          fi

          echo "xcresult bundle found"
          du -sh TestResults.xcresult

          # ── Xcode 16+ attachment extraction ──
          # 1. Dump the top-level xcresult JSON
          #    Try new format first (no --format), then legacy
          xcrun xcresulttool get --path TestResults.xcresult > /tmp/xcresult.json 2>/tmp/xcresult_err.txt
          if [ $? -ne 0 ] || [ ! -s /tmp/xcresult.json ]; then
            echo "New-format xcresulttool failed ($(cat /tmp/xcresult_err.txt)), trying legacy..."
            xcrun xcresulttool get --path TestResults.xcresult --format json --legacy > /tmp/xcresult.json 2>/tmp/xcresult_err.txt || true
          fi

          if [ ! -s /tmp/xcresult.json ]; then
            echo "⚠️ Could not extract JSON from xcresult bundle"
            cat /tmp/xcresult_err.txt 2>/dev/null
            echo "=== Build log tail ==="
            tail -30 build.log 2>/dev/null || true
            exit 0
          fi

          echo "xcresult JSON extracted ($(wc -c < /tmp/xcresult.json) bytes)"

          # 2. Parse JSON to find all attachment reference IDs and their names
          python3 << 'PYEOF'
          import json, subprocess, sys, os, re

          RESULT_PATH = "TestResults.xcresult"
          OUT_DIR = "screenshots"

          def load_json(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except Exception as e:
                  print(f"Failed to parse xcresult JSON: {e}")
                  return None

          def find_attachments(obj, attachments=None, current_name=""):
              """Recursively walk the xcresult JSON to find test attachment payloads."""
              if attachments is None:
                  attachments = []
              if isinstance(obj, dict):
                  obj_type = obj.get("_type", {}).get("_name", "")

                  # Capture attachment name for file naming
                  name = ""
                  if "name" in obj and isinstance(obj["name"], dict):
                      name = obj["name"].get("_value", "")

                  # ActionTestAttachment contains the payload reference
                  if obj_type == "ActionTestAttachment":
                      payload_ref = (obj.get("payloadRef", {})
                                        .get("id", {})
                                        .get("_value", ""))
                      if payload_ref:
                          attachments.append({"name": name, "ref": payload_ref})

                  for v in obj.values():
                      find_attachments(v, attachments, name or current_name)

              elif isinstance(obj, list):
                  for item in obj:
                      find_attachments(item, attachments, current_name)

              return attachments

          data = load_json("/tmp/xcresult.json")
          if not data:
              # Fallback: try legacy format
              print("Trying legacy xcresulttool format...")
              result = subprocess.run(
                  ["xcrun", "xcresulttool", "get", "--path", RESULT_PATH, "--format", "json", "--legacy"],
                  capture_output=True, text=True
              )
              if result.returncode == 0 and result.stdout.strip():
                  data = json.loads(result.stdout)

          if not data:
              print("Could not parse xcresult bundle with any method.")
              sys.exit(0)

          attachments = find_attachments(data)
          print(f"Found {len(attachments)} attachments")

          exported = 0
          for i, att in enumerate(attachments):
              # Use the attachment name if available, otherwise a numbered fallback
              safe_name = re.sub(r'[^a-zA-Z0-9_\-]', '_', att["name"]) if att["name"] else f"attachment_{i}"
              out_path = os.path.join(OUT_DIR, f"{safe_name}.png")

              result = subprocess.run(
                  ["xcrun", "xcresulttool", "export", "--type", "file",
                   "--path", RESULT_PATH, "--id", att["ref"],
                   "--output-path", out_path],
                  capture_output=True, text=True, timeout=15
              )

              if result.returncode != 0:
                  # Try with --legacy flag
                  result = subprocess.run(
                      ["xcrun", "xcresulttool", "export", "object", "--legacy",
                       "--path", RESULT_PATH, "--id", att["ref"],
                       "--type", "file", "--output-path", out_path],
                      capture_output=True, text=True, timeout=15
                  )

              if result.returncode == 0 and os.path.exists(out_path) and os.path.getsize(out_path) > 0:
                  exported += 1
                  print(f"  ✅ {safe_name}.png ({os.path.getsize(out_path)} bytes)")
              else:
                  print(f"  ❌ {safe_name}: export failed - {result.stderr.strip()}")

          print(f"\n📸 Exported {exported}/{len(attachments)} screenshots")
          PYEOF

          echo ""
          echo "📸 Screenshots captured:"
          ls -la screenshots/ 2>/dev/null || echo "No screenshots found"
          echo "Total image files: $(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l)"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Full Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Post Screenshots to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL secret not set — skipping Slack notification"
            exit 0
          fi

          SCREENSHOT_COUNT=$(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l | tr -d ' ')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 80)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$SCREENSHOT_COUNT" -gt "0" ]; then
            STATUS="✅ $SCREENSHOT_COUNT screenshots captured"
          else
            STATUS="⚠️ No screenshots captured — check CI logs"
          fi

          # Post summary to Slack
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"📸 *Screenshot CI* — \`${COMMIT_SHA}\` ${COMMIT_MSG}\n${STATUS}\n<${RUN_URL}|View Run> · <${RUN_URL}#artifacts|Download Screenshots>\"
            }" || echo "Slack notification failed"

      - name: Post Screenshot Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const screenshotDir = 'screenshots';

            let body = '## 📸 Screenshot Test Results\n\n';

            try {
              const files = fs.readdirSync(screenshotDir)
                .filter(f => f.endsWith('.png') || f.endsWith('.jpg'))
                .sort();

              if (files.length > 0) {
                body += `✅ **${files.length} screenshots captured** — download the \`app-screenshots\` artifact to review.\n\n`;
                body += '| Screenshot | File |\n|---|---|\n';
                files.forEach(f => {
                  const name = f.replace(/\.(png|jpg)$/, '').replace(/_/g, ' ');
                  body += `| ${name} | \`${f}\` |\n`;
                });
              } else {
                body += '⚠️ No screenshots were captured. Check the test logs and `test-results` artifact.\n';
              }
            } catch (e) {
              body += '⚠️ Could not read screenshots directory.\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
