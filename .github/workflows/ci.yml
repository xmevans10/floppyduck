name: CI Build & Screenshots

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Unit Tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          # Use latest Xcode 16.x available on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

          # Find the latest iOS simulator runtime
          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

          # Verify the simulator exists
          xcrun simctl list devices "iPhone 16 Pro" available

      - name: Build (Debug, iphonesimulator)
        run: |
          xcodebuild build \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit

  screenshots:
    name: Screenshot Tests
    runs-on: macos-15
    timeout-minutes: 25
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" 2>/dev/null || true
          sleep 5
          xcrun simctl status_bar "iPhone 16 Pro" override \
            --time "9:41" --batteryState charged --batteryLevel 100 \
            --cellularBars 4 --wifiBars 3 2>/dev/null || true

      - name: Run Screenshot Tests
        id: run_tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckUITests/ScreenshotTests \
            -skip-testing:FloppyDuckTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty
        continue-on-error: true

      - name: Extract Screenshots
        if: always()
        timeout-minutes: 5
        run: |
          set +e
          mkdir -p screenshots

          if [ ! -d "TestResults.xcresult" ]; then
            echo "⚠️ No TestResults.xcresult found"
            tail -50 build.log 2>/dev/null || true
            exit 0
          fi

          echo "xcresult bundle found ($(du -sh TestResults.xcresult | cut -f1))"

          # Extraction script — tries multiple strategies with full error logging.
          python3 << 'PYEOF'
          import json, subprocess, os, re, sys, shutil

          RESULT_PATH = "TestResults.xcresult"
          OUT_DIR      = "screenshots"
          CMD_TIMEOUT  = 30
          EXPORT_TIMEOUT = 15

          def run(cmd, timeout=CMD_TIMEOUT):
              """Run a command; return (stdout, stderr, returncode)."""
              try:
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=timeout)
                  if r.returncode != 0 and r.stderr.strip():
                      print(f"  stderr: {r.stderr.strip()[:200]}")
                  return r.stdout, r.stderr, r.returncode
              except subprocess.TimeoutExpired:
                  print(f"  ⏱️  Timed out after {timeout}s: {' '.join(cmd[:5])}...")
                  return "", "", -1
              except Exception as e:
                  print(f"  💥 {e}")
                  return "", "", -1

          def safe_name(name, i):
              return re.sub(r'[^a-zA-Z0-9_\-]', '_', name) if name else f"att_{i}"

          # Show xcresulttool version for debugging
          out, _, _ = run(["xcrun", "xcresulttool", "version"])
          print(f"xcresulttool version: {out.strip()}")

          # ── Strategy 1: Xcode 16+ test-results tests JSON ─────────
          # Parse the test-results JSON for attachment references, then
          # export each one by its UUID/ref.
          print("\n━━━ Strategy 1: test-results tests + export ━━━")
          out, err, rc = run(["xcrun", "xcresulttool", "get", "test-results",
                              "tests", "--path", RESULT_PATH])
          exported = 0
          if rc == 0 and out.strip():
              try:
                  data = json.loads(out)
                  # Walk test nodes looking for attachments with payloadRef
                  refs = []
                  def walk(obj):
                      if isinstance(obj, dict):
                          # Xcode 16 test-results format: attachments have
                          # "payloadRef" with "id" inside
                          name = obj.get("name", "")
                          ref = obj.get("payloadRef", {})
                          rid = ref.get("id", "") if isinstance(ref, dict) else ""
                          if rid:
                              refs.append((name, rid))
                          for v in obj.values():
                              walk(v)
                      elif isinstance(obj, list):
                          for item in obj:
                              walk(item)
                  walk(data)
                  print(f"  Found {len(refs)} attachment refs")
                  for i, (name, rid) in enumerate(refs):
                      fname = safe_name(name, i)
                      dest = os.path.join(OUT_DIR, f"{fname}.png")
                      _, _, erc = run(["xcrun", "xcresulttool", "export",
                                       "--path", RESULT_PATH, "--id", rid,
                                       "--output-path", dest, "--type", "file"],
                                      timeout=EXPORT_TIMEOUT)
                      if erc == 0 and os.path.exists(dest) and os.path.getsize(dest) > 0:
                          exported += 1
                          print(f"  ✅ {fname}.png ({os.path.getsize(dest):,} bytes)")
                      else:
                          print(f"  ❌ {fname} (ref {rid[:12]}): export failed")
              except json.JSONDecodeError as e:
                  print(f"  JSON parse error: {e}")
                  print(f"  First 300 chars: {out[:300]}")
          else:
              print(f"  Command failed (rc={rc})")
              if err.strip():
                  print(f"  {err.strip()[:300]}")

          if exported > 0:
              print(f"\n📸 Strategy 1: {exported} screenshots exported")
              sys.exit(0)

          # ── Strategy 2: legacy JSON format ─────────────────────────
          print("\n━━━ Strategy 2: legacy JSON ━━━")
          out, err, rc = run(["xcrun", "xcresulttool", "get", "--path",
                              RESULT_PATH, "--format", "json", "--legacy"])
          if rc == 0 and out.strip():
              try:
                  data = json.loads(out)
                  refs = []
                  def walk_legacy(obj):
                      if isinstance(obj, dict):
                          name_obj = obj.get("name", obj.get("filename", ""))
                          name = name_obj.get("_value", "") if isinstance(name_obj, dict) else str(name_obj)
                          for rk in ("payloadRef", "payload"):
                              ref_obj = obj.get(rk, {})
                              if isinstance(ref_obj, dict):
                                  rid_obj = ref_obj.get("id", "")
                                  rid = rid_obj.get("_value", "") if isinstance(rid_obj, dict) else str(rid_obj)
                                  if rid:
                                      refs.append((name, rid))
                                      return
                          for v in obj.values():
                              walk_legacy(v)
                      elif isinstance(obj, list):
                          for item in obj:
                              walk_legacy(item)
                  walk_legacy(data)
                  print(f"  Found {len(refs)} attachment refs")
                  if not refs:
                      # Debug: show structure
                      top = list(data.keys())[:8] if isinstance(data, dict) else f"type={type(data).__name__}"
                      print(f"  Top-level: {top}")
                  for i, (name, rid) in enumerate(refs):
                      fname = safe_name(name, i)
                      dest = os.path.join(OUT_DIR, f"{fname}.png")
                      for export_cmd in [
                          ["xcrun", "xcresulttool", "export", "--path",
                           RESULT_PATH, "--id", rid, "--output-path", dest,
                           "--type", "file"],
                          ["xcrun", "xcresulttool", "export", "--path",
                           RESULT_PATH, "--id", rid, "--output-path", dest,
                           "--type", "file", "--legacy"],
                      ]:
                          _, _, erc = run(export_cmd, timeout=EXPORT_TIMEOUT)
                          if erc == 0 and os.path.exists(dest) and os.path.getsize(dest) > 0:
                              exported += 1
                              print(f"  ✅ {fname}.png ({os.path.getsize(dest):,} bytes)")
                              break
                      else:
                          print(f"  ❌ {fname}: export failed")
              except json.JSONDecodeError as e:
                  print(f"  JSON parse error: {e}")
          else:
              print(f"  Command failed (rc={rc})")

          if exported > 0:
              print(f"\n📸 Strategy 2: {exported} screenshots exported")
              sys.exit(0)

          # ── Strategy 3: brute-force binary search ──────────────────
          print("\n━━━ Strategy 3: brute-force file search in xcresult bundle ━━━")
          # List all files in xcresult for debugging
          all_files = []
          for root, dirs, files in os.walk(RESULT_PATH):
              for f in files:
                  fp = os.path.join(root, f)
                  sz = os.path.getsize(fp) if os.path.exists(fp) else 0
                  all_files.append((fp, sz))
          all_files.sort(key=lambda x: -x[1])
          print(f"  Total files in bundle: {len(all_files)}")
          for fp, sz in all_files[:10]:
              rel = fp.replace(RESULT_PATH + "/", "")
              # Read magic bytes
              try:
                  with open(fp, "rb") as fh:
                      magic = fh.read(8)
                  print(f"  {rel} ({sz:,}b) magic={magic[:4].hex()}")
              except Exception:
                  print(f"  {rel} ({sz:,}b)")

          found = []
          for fp, sz in all_files:
              try:
                  with open(fp, "rb") as fh:
                      header = fh.read(8)
                  if header[:4] == b'\x89PNG' or header[:3] == b'\xff\xd8\xff':
                      found.append(fp)
              except Exception:
                  pass

          print(f"  Image files found: {len(found)}")
          for i, fp in enumerate(found):
              dest = os.path.join(OUT_DIR, f"raw_{i:02d}.png")
              shutil.copy2(fp, dest)
              print(f"  ✅ raw_{i:02d}.png ({os.path.getsize(dest):,} bytes)")
              exported += 1

          if exported == 0:
              print("\n⚠️  All strategies found 0 screenshots.")
              print("    Check build.log and test-results artifact for details.")
          PYEOF

          echo ""
          echo "📸 Final screenshot count:"
          ls -la screenshots/ 2>/dev/null || echo "  (empty)"
          TOTAL=$(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l | tr -d ' ')
          echo "  Total image files: $TOTAL"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Full Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Post Screenshots to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL secret not set — skipping Slack notification"
            exit 0
          fi

          SCREENSHOT_COUNT=$(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l | tr -d ' ')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 80)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$SCREENSHOT_COUNT" -gt "0" ]; then
            STATUS="✅ $SCREENSHOT_COUNT screenshots captured"
          else
            STATUS="⚠️ No screenshots captured — check CI logs"
          fi

          # Post summary to Slack
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"📸 *Screenshot CI* — \`${COMMIT_SHA}\` ${COMMIT_MSG}\n${STATUS}\n<${RUN_URL}|View Run> · <${RUN_URL}#artifacts|Download Screenshots>\"
            }" || echo "Slack notification failed"

      - name: Post Screenshot Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const screenshotDir = 'screenshots';

            let body = '## 📸 Screenshot Test Results\n\n';

            try {
              const files = fs.readdirSync(screenshotDir)
                .filter(f => f.endsWith('.png') || f.endsWith('.jpg'))
                .sort();

              if (files.length > 0) {
                body += `✅ **${files.length} screenshots captured** — download the \`app-screenshots\` artifact to review.\n\n`;
                body += '| Screenshot | File |\n|---|---|\n';
                files.forEach(f => {
                  const name = f.replace(/\.(png|jpg)$/, '').replace(/_/g, ' ');
                  body += `| ${name} | \`${f}\` |\n`;
                });
              } else {
                body += '⚠️ No screenshots were captured. Check the test logs and `test-results` artifact.\n';
              }
            } catch (e) {
              body += '⚠️ Could not read screenshots directory.\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
