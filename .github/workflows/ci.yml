name: CI Build & Screenshots

on:
  pull_request:
    branches: [main]
    paths:
      - 'FloppyDuck/**'
      - 'FloppyDuckTests/**'
      - 'FloppyDuckUITests/**'
      - 'FloppyDuck.xcodeproj/**'
      - '.github/workflows/ci.yml'
      - '.swiftlint.yml'
  push:
    branches: [main]
    paths:
      - 'FloppyDuck/**'
      - 'FloppyDuckTests/**'
      - 'FloppyDuckUITests/**'
      - 'FloppyDuck.xcodeproj/**'
      - '.github/workflows/ci.yml'
      - '.swiftlint.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint
        uses: realm/SwiftLint@main
        with:
          version: latest
          working_directory: .

  project-integrity:
    name: Project Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for merge conflict markers
        run: |
          if grep -E "<<<<<<<|=======|>>>>>>>" FloppyDuck.xcodeproj/project.pbxproj; then
            echo "❌ Project file contains merge conflict markers!"
            exit 1
          fi
      - name: Check for duplicated files in pbxproj
        run: |
          # Basic check for common pbxproj duplication issues
          if uniq -d FloppyDuck.xcodeproj/project.pbxproj | grep -E "isa = (PBXFileReference|PBXGroup)"; then
             echo "⚠️ Warning: Potential duplicate entries in pbxproj detected."
          fi

  build-and-test:
    name: Build + Unit Tests
    runs-on: macos-15
    timeout-minutes: 20
    needs: [lint, project-integrity]

    steps:
      - uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-deriveddata-${{ hashFiles('FloppyDuck.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-deriveddata-

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          # Use latest Xcode 16.x available on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

          # Find the latest iOS simulator runtime
          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

          # Verify the simulator exists
          xcrun simctl list devices "iPhone 16 Pro" available

      - name: Build & Analyze (Debug, iphonesimulator)
        run: |
          xcodebuild build analyze \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -configuration Debug \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit

  screenshots:
    name: Screenshot Tests
    runs-on: macos-15
    timeout-minutes: 25
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" 2>/dev/null || true
          sleep 5
          xcrun simctl status_bar "iPhone 16 Pro" override \
            --time "9:41" --batteryState charged --batteryLevel 100 \
            --cellularBars 4 --wifiBars 3 2>/dev/null || true

      - name: Run Screenshot Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckUITests/ScreenshotTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty
        continue-on-error: true

      - name: Extract Screenshots
        if: always()
        run: |
          mkdir -p screenshots

          echo "=== Checking TestResults.xcresult ==="
          if [ -d "TestResults.xcresult" ]; then
            echo "xcresult bundle found"
            du -sh TestResults.xcresult

            # Method 1: xcresulttool (Xcode 16+)
            echo "--- Trying xcresulttool export ---"
            xcrun xcresulttool export \
              --type file \
              --path TestResults.xcresult \
              --output-path screenshots/ 2>&1 || true

            # Method 2: find png/jpg directly inside the bundle
            echo "--- Searching for images in bundle ---"
            find TestResults.xcresult -name "*.png" -exec cp {} screenshots/ \; 2>/dev/null || true
            find TestResults.xcresult -name "*.jpg" -exec cp {} screenshots/ \; 2>/dev/null || true

            # Method 3: Use xcresulttool to get attachment refs and export them
            echo "--- Trying attachment extraction via xcresulttool ---"
            xcrun xcresulttool get --path TestResults.xcresult --format json 2>/dev/null | \
              python3 -c "
          import json, sys, subprocess, os
          try:
              data = json.load(sys.stdin)
              def find_refs(obj, refs=[]):
                  if isinstance(obj, dict):
                      if obj.get('_type', {}).get('_name') == 'Reference':
                          ref_id = obj.get('id', {}).get('_value', '')
                          if ref_id:
                              refs.append(ref_id)
                      for v in obj.values():
                          find_refs(v, refs)
                  elif isinstance(obj, list):
                      for item in obj:
                          find_refs(item, refs)
                  return refs
              refs = find_refs(data)
              print(f'Found {len(refs)} refs')
              for i, ref in enumerate(refs):
                  try:
                      subprocess.run([
                          'xcrun', 'xcresulttool', 'get',
                          '--path', 'TestResults.xcresult',
                          '--id', ref,
                          '--output-path', f'screenshots/attachment_{i}.png'
                      ], timeout=10, capture_output=True)
                  except: pass
          except Exception as e:
              print(f'Extraction error: {e}')
          " 2>/dev/null || true
          else
            echo "⚠️ No TestResults.xcresult found"
            echo "=== Build log tail ==="
            tail -50 build.log 2>/dev/null || true
          fi

          echo ""
          echo "📸 Screenshots captured:"
          ls -la screenshots/ 2>/dev/null || echo "No screenshots found"
          echo "Total image files: $(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l)"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Full Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Post Screenshot Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const screenshotDir = 'screenshots';

            let body = '## 📸 Screenshot Test Results\n\n';

            try {
              const files = fs.readdirSync(screenshotDir)
                .filter(f => f.endsWith('.png') || f.endsWith('.jpg'))
                .sort();

              if (files.length > 0) {
                body += `✅ **${files.length} screenshots captured** — download the \`app-screenshots\` artifact to review.\n\n`;
                body += '| Screenshot | File |\n|---|---|\n';
                files.forEach(f => {
                  const name = f.replace(/\.(png|jpg)$/, '').replace(/_/g, ' ');
                  body += `| ${name} | \`${f}\` |\n`;
                });
              } else {
                body += '⚠️ No screenshots were captured. Check the test logs and `test-results` artifact.\n';
              }
            } catch (e) {
              body += '⚠️ Could not read screenshots directory.\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
