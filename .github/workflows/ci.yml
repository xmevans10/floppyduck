name: CI Build & Screenshots

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Unit Tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          # Use latest Xcode 16.x available on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

          # Find the latest iOS simulator runtime
          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

          # Verify the simulator exists
          xcrun simctl list devices "iPhone 16 Pro" available

      - name: Build (Debug, iphonesimulator)
        run: |
          xcodebuild build \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit

  screenshots:
    name: Screenshot Tests
    runs-on: macos-15
    timeout-minutes: 25
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & find simulator
        id: xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

          IOS_VERSION=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          avail = [r for r in runtimes if r.get('isAvailable')]
          print(avail[-1]['version'] if avail else '18.0')
          ")
          echo "ios_version=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "iOS Simulator version: $IOS_VERSION"

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" 2>/dev/null || true
          sleep 5
          xcrun simctl status_bar "iPhone 16 Pro" override \
            --time "9:41" --batteryState charged --batteryLevel 100 \
            --cellularBars 4 --wifiBars 3 2>/dev/null || true

      - name: Run Screenshot Tests
        id: run_tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project FloppyDuck.xcodeproj \
            -scheme FloppyDuck \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=${{ steps.xcode.outputs.ios_version }}' \
            -only-testing:FloppyDuckUITests/ScreenshotTests \
            -skip-testing:FloppyDuckTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty
        continue-on-error: true

      - name: Extract Screenshots
        if: always()
        run: |
          set +e
          mkdir -p screenshots

          if [ ! -d "TestResults.xcresult" ]; then
            echo "⚠️ No TestResults.xcresult found"
            tail -50 build.log 2>/dev/null || true
            exit 0
          fi

          echo "xcresult bundle found ($(du -sh TestResults.xcresult | cut -f1))"

          # ── Strategy 1: Xcode 16+ `test-results attachments` API ──
          # This is the cleanest way — lists every attachment with its ref ID.
          echo "--- Trying xcresulttool get test-results attachments ---"
          xcrun xcresulttool get test-results attachments \
            --path TestResults.xcresult \
            --output-path /tmp/attachments.json 2>/tmp/att_err.txt

          if [ -s /tmp/attachments.json ]; then
            echo "Xcode 16+ attachments API succeeded"
            python3 << 'PYEOF'
          import json, subprocess, os, re

          RESULT_PATH = "TestResults.xcresult"
          OUT_DIR = "screenshots"

          with open("/tmp/attachments.json") as f:
              data = json.load(f)

          # The output is a list of test nodes; attachments live inside them
          attachments = []

          def walk(obj):
              if isinstance(obj, dict):
                  # Look for attachment-like objects with payloadRef/payload
                  name = obj.get("name", "")
                  if isinstance(name, dict):
                      name = name.get("_value", name.get("value", ""))

                  for key in ("payloadRef", "payload"):
                      ref_obj = obj.get(key)
                      if ref_obj:
                          ref_id = ref_obj.get("id", "")
                          if isinstance(ref_id, dict):
                              ref_id = ref_id.get("_value", ref_id.get("value", ""))
                          if ref_id:
                              attachments.append({"name": name, "ref": ref_id})
                              return

                  for v in obj.values():
                      walk(v)
              elif isinstance(obj, list):
                  for item in obj:
                      walk(item)

          walk(data)
          print(f"Found {len(attachments)} attachments via test-results API")

          exported = 0
          for i, att in enumerate(attachments):
              safe_name = re.sub(r'[^a-zA-Z0-9_\-]', '_', att["name"]) if att["name"] else f"attachment_{i}"
              out_path = os.path.join(OUT_DIR, f"{safe_name}.png")

              for cmd in [
                  ["xcrun", "xcresulttool", "export", "--type", "file",
                   "--path", RESULT_PATH, "--id", att["ref"],
                   "--output-path", out_path],
                  ["xcrun", "xcresulttool", "export", "object", "--legacy",
                   "--path", RESULT_PATH, "--id", att["ref"],
                   "--type", "file", "--output-path", out_path],
              ]:
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  if r.returncode == 0 and os.path.exists(out_path) and os.path.getsize(out_path) > 0:
                      exported += 1
                      print(f"  ✅ {safe_name}.png ({os.path.getsize(out_path)} bytes)")
                      break
              else:
                  print(f"  ❌ {safe_name}: export failed")

          print(f"\n📸 Exported {exported}/{len(attachments)} screenshots")
          PYEOF

          else
            echo "test-results API not available ($(cat /tmp/att_err.txt 2>/dev/null))"
            echo "--- Fallback: parse xcresult JSON tree ---"

            # Try new format, then legacy
            xcrun xcresulttool get --path TestResults.xcresult > /tmp/xcresult.json 2>/dev/null
            if [ ! -s /tmp/xcresult.json ]; then
              xcrun xcresulttool get --path TestResults.xcresult --format json --legacy > /tmp/xcresult.json 2>/dev/null || true
            fi

            if [ ! -s /tmp/xcresult.json ]; then
              echo "⚠️ Could not extract JSON from xcresult bundle"
              tail -30 build.log 2>/dev/null || true
              exit 0
            fi

            echo "xcresult JSON extracted ($(wc -c < /tmp/xcresult.json) bytes)"

            python3 << 'PYEOF'
          import json, subprocess, sys, os, re

          RESULT_PATH = "TestResults.xcresult"
          OUT_DIR = "screenshots"

          with open("/tmp/xcresult.json") as f:
              data = json.load(f)

          def find_attachments(obj, attachments=None):
              """Walk xcresult JSON to find attachments (handles both Xcode 16+ and legacy)."""
              if attachments is None:
                  attachments = []
              if isinstance(obj, dict):
                  name = obj.get("name", "")
                  if isinstance(name, dict):
                      name = name.get("_value", name.get("value", ""))

                  # Check for payloadRef in both formats
                  payload_ref = obj.get("payloadRef", {})
                  ref_id = ""
                  if isinstance(payload_ref, dict):
                      rid = payload_ref.get("id", "")
                      ref_id = rid.get("_value", rid) if isinstance(rid, dict) else rid

                  obj_type = obj.get("_type", {}).get("_name", "")
                  is_attachment = bool(ref_id) and (
                      obj_type == "ActionTestAttachment"
                      or "payloadRef" in obj
                  )

                  if is_attachment and ref_id:
                      attachments.append({"name": name, "ref": ref_id})
                  else:
                      for v in obj.values():
                          find_attachments(v, attachments)

              elif isinstance(obj, list):
                  for item in obj:
                      find_attachments(item, attachments)
              return attachments

          attachments = find_attachments(data)
          print(f"Found {len(attachments)} attachments via JSON tree walk")

          exported = 0
          for i, att in enumerate(attachments):
              safe_name = re.sub(r'[^a-zA-Z0-9_\-]', '_', att["name"]) if att["name"] else f"attachment_{i}"
              out_path = os.path.join(OUT_DIR, f"{safe_name}.png")

              for cmd in [
                  ["xcrun", "xcresulttool", "export", "--type", "file",
                   "--path", RESULT_PATH, "--id", att["ref"],
                   "--output-path", out_path],
                  ["xcrun", "xcresulttool", "export", "object", "--legacy",
                   "--path", RESULT_PATH, "--id", att["ref"],
                   "--type", "file", "--output-path", out_path],
              ]:
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  if r.returncode == 0 and os.path.exists(out_path) and os.path.getsize(out_path) > 0:
                      exported += 1
                      print(f"  ✅ {safe_name}.png ({os.path.getsize(out_path)} bytes)")
                      break
              else:
                  print(f"  ❌ {safe_name}: export failed")

          print(f"\n📸 Exported {exported}/{len(attachments)} screenshots")
          PYEOF
          fi

          echo ""
          echo "📸 Screenshots captured:"
          ls -la screenshots/ 2>/dev/null || echo "No screenshots found"
          echo "Total image files: $(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l)"

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Full Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Post Screenshots to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL secret not set — skipping Slack notification"
            exit 0
          fi

          SCREENSHOT_COUNT=$(find screenshots -name '*.png' -o -name '*.jpg' 2>/dev/null | wc -l | tr -d ' ')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 80)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$SCREENSHOT_COUNT" -gt "0" ]; then
            STATUS="✅ $SCREENSHOT_COUNT screenshots captured"
          else
            STATUS="⚠️ No screenshots captured — check CI logs"
          fi

          # Post summary to Slack
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"📸 *Screenshot CI* — \`${COMMIT_SHA}\` ${COMMIT_MSG}\n${STATUS}\n<${RUN_URL}|View Run> · <${RUN_URL}#artifacts|Download Screenshots>\"
            }" || echo "Slack notification failed"

      - name: Post Screenshot Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const screenshotDir = 'screenshots';

            let body = '## 📸 Screenshot Test Results\n\n';

            try {
              const files = fs.readdirSync(screenshotDir)
                .filter(f => f.endsWith('.png') || f.endsWith('.jpg'))
                .sort();

              if (files.length > 0) {
                body += `✅ **${files.length} screenshots captured** — download the \`app-screenshots\` artifact to review.\n\n`;
                body += '| Screenshot | File |\n|---|---|\n';
                files.forEach(f => {
                  const name = f.replace(/\.(png|jpg)$/, '').replace(/_/g, ' ');
                  body += `| ${name} | \`${f}\` |\n`;
                });
              } else {
                body += '⚠️ No screenshots were captured. Check the test logs and `test-results` artifact.\n';
              }
            } catch (e) {
              body += '⚠️ Could not read screenshots directory.\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
