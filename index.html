<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floppy Duck</title>
  <style>
    :root {
      --sky: #67bdf0;
      --cream: #fff8df;
      --ink: #2b2418;
      --green: #31571f;
      --gold: #f4c430;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, var(--sky), #a8db8f);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 28px;
    }
    main {
      width: min(100%, 620px);
      background: var(--cream);
      border: 3px solid var(--green);
      border-radius: 14px;
      box-shadow: 0 7px 0 var(--green);
      padding: 32px;
    }
    h1 { margin: 0 0 8px; font-size: 34px; line-height: 1.1; }
    p { font-size: 16px; line-height: 1.6; }
    nav { display: grid; gap: 12px; margin-top: 24px; }
    a.button {
      display: block;
      padding: 14px 16px;
      border-radius: 8px;
      background: var(--green);
      color: var(--cream);
      text-decoration: none;
      font-weight: 700;
    }
    footer { margin-top: 24px; font-size: 13px; color: #6b6254; }
  </style>
</head>
<body>
  <main>
    <h1>Floppy Duck</h1>
    <p>Floppy Duck is a retro iOS arcade game. This site provides the public support, privacy, and terms pages used for App Store submission.</p>
    <nav aria-label="App Store submission pages">
      <a class="button" href="support.html">Support</a>
      <a class="button" href="privacy.html">Privacy Policy</a>
      <a class="button" href="terms.html">Terms of Service</a>
    </nav>
    <footer>Last updated: June 1, 2026</footer>
  </main>
</body>
</html>
